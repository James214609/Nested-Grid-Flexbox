<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css">
    <title>Nested Grid Flexbox</title>
</head>
    <body>
        <main class="grid-con center-grid-con">
          <section class="flex-container col-span-full">
            <h2 class="box boxh2">Visit Europe</h2>
            <img src="images/london.jpg" alt="London, UK at night">
            <div class="box box1">Select a country to see wondrous sites</div>
            <div class="box">France</div>
            <div class="box">UK</div>
            <div class="box">Italy</div>
            <div class="box">Netherlands</div>
            <div class="box">Denmark</div>
            <div class="box">Belgium</div>
            <div class="box">Spain</div>
            <div class="box">Switzerland</div>
            <div class="box">Austria</div>
            <div class="box">Portugal</div>
            <div class="box">Norway</div>
            <div class="box">Sweden</div>
            <div class="box">Finland</div>
            <div class="box">Luxembourg</div>
            <div class="box">Ireland</div>
          </section>  
        </main>
    </body>
</html>
